name: Update final market reports and archive

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 1-5'
    - cron: '30 20 * * 1-5'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate final reports
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/generate_reports.py

      - name: Skip git push for now
        run: |
          echo "Reports generated successfully."
          echo "Skipping commit/push because main has remote history conflicts."
